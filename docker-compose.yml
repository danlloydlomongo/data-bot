services:
  # ─────────────── Reverse Proxy ───────────────
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.localhost`) || Host(`traefik.test`)
      - traefik.http.routers.traefik.service=api@internal
    networks:
      - web

  # ─────────────── Laravel (PHP-FPM) ───────────────
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: laravel
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    env_file:
      - ./env/laravel.env
    networks:
      - web

  # ─────────────── Nginx ───────────────
  nginx:
    image: nginx:alpine
    container_name: data-bot-nginx
    restart: unless-stopped
    volumes:
      - ./laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel
    labels:
      - traefik.enable=true
      - traefik.http.routers.laravel.rule=Host(`app.localhost`) || Host(`data-bot.test`) || Host(`association.test`)
      - traefik.http.services.laravel.loadbalancer.server.port=80
    networks:
      - web

  # ─────────────── Node / Vite Dev Server ───────────────
  node:
    image: node:22-alpine
    container_name: data-bot-node
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.http.routers.vite.rule=Host(`vite.localhost`)
      - traefik.http.services.vite.loadbalancer.server.port=5173
    networks:
      - web
    profiles:
      - dev

  # ─────────────── FastAPI ───────────────
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: data-bot-fastapi
    restart: unless-stopped
    volumes:
      - ./fastapi/app:/app
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    env_file:
      - ./env/fastapi.env
    labels:
      - traefik.enable=true
      - traefik.http.routers.fastapi.rule=Host(`api.localhost`) || Host(`api.test`) || Host(`fastapi.test`)
      - traefik.http.services.fastapi.loadbalancer.server.port=8000
    networks:
      - web

  # ─────────────── MariaDB ───────────────
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - ./env/mariadb.env
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  # ─────────────── phpMyAdmin ───────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    env_file:
      - ./env/phpmyadmin.env
    depends_on:
      mariadb:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.phpmyadmin.rule=Host(`pma.localhost`) || Host(`pma.test`)
      - traefik.http.services.phpmyadmin.loadbalancer.server.port=80
    networks:
      - web

  # ─────────────── MongoDB ───────────────
  mongodb:
    image: mongo:7
    container_name: data-bot-mongodb
    restart: unless-stopped
    env_file:
      - ./env/mongodb.env
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    extra_hosts:
      - "mongo.test:127.0.0.1"
    networks:
      - web

  # ─────────────── Soketi (WebSocket Server) ───────────────
  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: data-bot-soketi
    restart: unless-stopped
    env_file:
      - ./env/soketi.env
    ports:
      - "6001:6001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.soketi.rule=Host(`ws.localhost`) || Host(`ws.test`)
      - traefik.http.services.soketi.loadbalancer.server.port=6001
    networks:
      - web

  # ─────────────── Queue Worker ───────────────
  queue-worker:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: data-bot-queue-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    env_file:
      - ./env/queue-worker.env
    networks:
      - web

  # ─────────────── Redis ───────────────
  redis:
    image: redis:7-alpine
    container_name: data-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

networks:
  web:
    name: data-bot-network
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
