services:
  # ─────────────── Reverse Proxy ───────────────
  traefik:
    image: traefik:v3.3
    container_name: data-bot-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.localhost`) || Host(`traefik.test`)
      - traefik.http.routers.traefik.service=api@internal
    networks:
      - web

  # ─────────────── Laravel (PHP-FPM) ───────────────
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: data-bot-laravel
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://data-bot.test
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-data_bot}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      BROADCAST_CONNECTION: pusher
      PUSHER_APP_ID: ${PUSHER_APP_ID:-app-id}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY:-app-key}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET:-app-secret}
      PUSHER_HOST: soketi
      PUSHER_PORT: "6001"
      PUSHER_SCHEME: http
    networks:
      - web

  # ─────────────── Nginx ───────────────
  nginx:
    image: nginx:alpine
    container_name: data-bot-nginx
    restart: unless-stopped
    volumes:
      - ./laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel
    labels:
      - traefik.enable=true
      - traefik.http.routers.laravel.rule=Host(`app.localhost`) || Host(`data-bot.test`)
      - traefik.http.services.laravel.loadbalancer.server.port=80
    networks:
      - web

  # ─────────────── Node / Vite Dev Server ───────────────
  node:
    image: node:22-alpine
    container_name: data-bot-node
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.http.routers.vite.rule=Host(`vite.localhost`)
      - traefik.http.services.vite.loadbalancer.server.port=5173
    networks:
      - web
    profiles:
      - dev

  # ─────────────── FastAPI ───────────────
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: data-bot-fastapi
    restart: unless-stopped
    volumes:
      - ./fastapi/app:/app
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USERNAME:-root}:${DB_PASSWORD:-secret}@mariadb:3306/${DB_DATABASE:-data_bot}
      MONGODB_URL: mongodb://${MONGO_USERNAME:-root}:${MONGO_PASSWORD:-secret}@mongodb:27017
      REDIS_URL: redis://redis:6379
    labels:
      - traefik.enable=true
      - traefik.http.routers.fastapi.rule=Host(`api.localhost`) || Host(`fastapi.test`)
      - traefik.http.services.fastapi.loadbalancer.server.port=8000
    networks:
      - web

  # ─────────────── MariaDB ───────────────
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-data_bot}
      MYSQL_USER: ${DB_USERNAME:-data_bot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  # ─────────────── phpMyAdmin ───────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: "3306"
      UPLOAD_LIMIT: 64M
    depends_on:
      mariadb:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.phpmyadmin.rule=Host(`pma.localhost`) || Host(`pma.test`)
      - traefik.http.services.phpmyadmin.loadbalancer.server.port=80
    networks:
      - web

  # ─────────────── MongoDB ───────────────
  mongodb:
    image: mongo:7
    container_name: data-bot-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    extra_hosts:
      - "mongo.test:127.0.0.1"
    networks:
      - web

  # ─────────────── Soketi (WebSocket Server) ───────────────
  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: data-bot-soketi
    restart: unless-stopped
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-app-id}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY:-app-key}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET:-app-secret}
    ports:
      - "6001:6001"
    labels:
      - traefik.enable=true
      - traefik.http.routers.soketi.rule=Host(`ws.localhost`) || Host(`ws.test`)
      - traefik.http.services.soketi.loadbalancer.server.port=6001
    networks:
      - web

  # ─────────────── Redis ───────────────
  redis:
    image: redis:7-alpine
    container_name: data-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

networks:
  web:
    name: data-bot-network
    driver: bridge

volumes:
  mariadb_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
